name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-20.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ ninja-build libacl1-dev

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: 3rd_party
          key: deps-${{ runner.os }}-iceoryx2.0.3-cyclonedds0.10.2

      - name: Build dependencies
        run: ./scripts/build_deps.sh

      - name: Configure
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build -j

      - name: Run tests
        run: ./build/tests/cddsctl_tests

      - name: Package
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          PKG_NAME="cddsctl-${VERSION}-linux-x86_64"
          mkdir -p ${PKG_NAME}/bin

          # Copy executable (statically linked, no .so needed)
          cp build/cli/cddsctl ${PKG_NAME}/bin/
          strip ${PKG_NAME}/bin/cddsctl

          # Create tarball
          tar -czvf ${PKG_NAME}.tar.gz ${PKG_NAME}
          echo "PKG_NAME=${PKG_NAME}" >> $GITHUB_ENV

      - name: Extract changelog for version
        id: changelog
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          # Extract changelog section for this version
          CHANGELOG=$(awk -v ver="## [${VERSION}]" '
            index($0, ver) { found=1; next }
            found && /^## \[/ { exit }
            found { print }
          ' CHANGELOG.md)

          # Write to file for release body
          echo "$CHANGELOG" > RELEASE_NOTES.md

          # Add download instructions
          echo "" >> RELEASE_NOTES.md
          echo "---" >> RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          echo "## Installation" >> RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          echo "\`\`\`bash" >> RELEASE_NOTES.md
          echo "tar -xzf cddsctl-${VERSION}-linux-x86_64.tar.gz" >> RELEASE_NOTES.md
          echo "sudo mv cddsctl-${VERSION}-linux-x86_64/bin/cddsctl /usr/local/bin/" >> RELEASE_NOTES.md
          echo "\`\`\`" >> RELEASE_NOTES.md

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.PKG_NAME }}.tar.gz
          body_path: RELEASE_NOTES.md
          name: cddsctl ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
