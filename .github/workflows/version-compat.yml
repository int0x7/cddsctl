name: Version Compatibility Tests

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'include/**'
      - 'cli/**'
      - 'examples/**'
      - 'tests/test_version_compat.py'
      - '.github/workflows/version-compat.yml'
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'include/**'
      - 'cli/**'
      - 'examples/**'
      - 'tests/test_version_compat.py'
  schedule:
    # Run weekly on Sunday at 00:00
    - cron: '0 0 * * 0'
  workflow_dispatch:
    inputs:
      test_all:
        description: 'Test all version combinations'
        required: false
        default: true
        type: boolean

jobs:
  compat-test-matrix:
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        tool_version: ['0.10.2', '0.10.3', '0.10.5']
        pub_version: ['0.10.2', '0.10.3', '0.10.5']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ python3 git

      - name: Cache versioned dependencies
        uses: actions/cache@v4
        with:
          path: build_compat_test
          key: compat-deps-${{ matrix.tool_version }}-${{ matrix.pub_version }}-${{ hashFiles('tests/test_version_compat.py') }}

      - name: Run compatibility test
        run: |
          python3 tests/test_version_compat.py \
            ${{ matrix.tool_version }} \
            ${{ matrix.pub_version }} \
            --json-output results.json

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: compat-results-${{ matrix.tool_version }}-${{ matrix.pub_version }}
          path: results.json

  compat-test-summary:
    runs-on: ubuntu-22.04
    needs: compat-test-matrix
    if: always()

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: compat-results-*

      - name: Summarize results
        run: |
          echo "# Version Compatibility Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Tool Version | Publisher Version | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|--------------|-------------------|--------|" >> $GITHUB_STEP_SUMMARY

          for f in artifacts/compat-results-*/results.json; do
            if [ -f "$f" ]; then
              tool=$(jq -r '.[0].tool_version' "$f")
              pub=$(jq -r '.[0].pub_version' "$f")
              passed=$(jq -r '.[0].passed' "$f")
              if [ "$passed" = "true" ]; then
                status="✅ PASS"
              else
                status="❌ FAIL"
              fi
              echo "| ${tool} | ${pub} | ${status} |" >> $GITHUB_STEP_SUMMARY
            fi
          done

      - name: Check for failures
        run: |
          failed=0
          for f in artifacts/compat-results-*/results.json; do
            if [ -f "$f" ]; then
              passed=$(jq -r '.[0].passed' "$f")
              if [ "$passed" != "true" ]; then
                tool=$(jq -r '.[0].tool_version' "$f")
                pub=$(jq -r '.[0].pub_version' "$f")
                echo "FAILED: cddsctl-${tool} + publisher-${pub}"
                failed=$((failed + 1))
              fi
            fi
          done

          if [ $failed -gt 0 ]; then
            echo "${failed} test(s) failed"
            exit 1
          fi
          echo "All tests passed!"
