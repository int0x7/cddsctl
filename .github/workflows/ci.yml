name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build:
    runs-on: ubuntu-22.04
    container: ubuntu:20.04
    env:
      DEBIAN_FRONTEND: noninteractive
      BUILD_TYPE: Release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y cmake g++ ninja-build libacl1-dev git

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: 3rd_party
          key: deps-${{ runner.os }}-iceoryx2.0.3-cyclonedds0.10.2

      - name: Build dependencies
        run: ./scripts/build_deps.sh

      - name: Configure
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }}

      - name: Build
        run: cmake --build build -j

      - name: Run tests
        run: ./build/tests/cddsctl_tests

      - name: Verify CLI
        run: ./build/cli/cddsctl --help
