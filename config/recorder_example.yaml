# DDS Recorder Configuration Example
# Copy this file and modify as needed

# DDS Configuration
dds:
  domain_id: 0
  discovery_timeout: 10.0  # seconds

  # Topic filtering (empty = record all)
  # use_regex: true    # Enable regex matching for topic patterns
  topics:
    - "/test/sensor"

# Output Configuration
output:
  prefix: "recording"          # File name prefix
  append_date: true       # Append date-time to filename
  max_file_size: 500      # MB, 0 = unlimited (kuavo default: 500)
  max_duration: 0           # seconds, 0 = unlimited
  split: true               # Enable file splitting on size/duration limit
  max_splits: 8             # Max split files to keep (0 = unlimited)
  min_space: 1024           # MB, minimum free disk space to continue recording
  buffer_size: 1            # MB

  compression:
    enabled: true
    type: "zstd"          # zstd, lz4, or none
    level: 3              # 1-19 for zstd, 1-12 for lz4

# Timing Configuration
timing:
  use_sim_time: false
  start_immediately: true
  # start_trigger_topic: "/start_recording"

# Logging Configuration
logging:
  level: "info"           # trace, debug, info, warning, error, critical
  console: true
  file_enabled: false
  file_path: "recorder.log"
